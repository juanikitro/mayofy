name: Deploy landing catalog to Vercel

on:
  push:
    branches: [main]
    paths:
      - "data/*-businesses.json"
      - "data/site-specs/*.json"
      - "data/frontends/**"
      - "scripts/detect-deploy-runs.mjs"
      - "scripts/generate-deploy-runs.mjs"
      - "scripts/build-vercel-catalog.mjs"
      - "scripts/deploy-generated.mjs"
      - ".github/workflows/deploy-vercel.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      run:
        description: "Optional run name, for example cordoba-conversion. Empty deploys every deployable run."
        required: false
        type: string
      vercel_scope:
        description: "Optional Vercel team/org scope slug"
        required: false
        type: string

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      runs: ${{ steps.detect.outputs.runs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect deployable runs
        id: detect
        run: |
          node scripts/detect-deploy-runs.mjs \
            --event-name "${{ github.event_name }}" \
            --manual-run "${{ github.event.inputs.run }}" \
            --before "${{ github.event.before }}" \
            --after "${{ github.sha }}"

  deploy:
    needs: detect
    if: ${{ needs.detect.outputs.runs != '[]' }}
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-vercel-catalog
      cancel-in-progress: false
    env:
      RUNS_JSON: ${{ needs.detect.outputs.runs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate and validate runs
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: node scripts/generate-deploy-runs.mjs --runs "$RUNS_JSON" --client-readiness warn

      - name: Build Vercel catalog
        run: node scripts/build-vercel-catalog.mjs --runs "$RUNS_JSON" --out dist/vercel-catalog

      - name: Deploy catalog to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: ${{ github.event.inputs.vercel_scope || secrets.VERCEL_SCOPE }}
        run: node scripts/deploy-generated.mjs --dir dist/vercel-catalog
