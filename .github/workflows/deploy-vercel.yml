name: Deploy generated landings to Vercel

on:
  push:
    branches: [main]
    paths:
      - "data/*-businesses.json"
      - "data/site-specs/*.json"
      - "data/frontends/**"
  workflow_dispatch:
    inputs:
      run:
        description: "Run name, for example cordoba-conversion"
        required: true
        type: string
      vercel_scope:
        description: "Optional Vercel team/org scope slug"
        required: false
        type: string

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      runs: ${{ steps.detect.outputs.runs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect deployable runs
        id: detect
        run: |
          node scripts/detect-deploy-runs.mjs \
            --event-name "${{ github.event_name }}" \
            --manual-run "${{ github.event.inputs.run }}" \
            --before "${{ github.event.before }}" \
            --after "${{ github.sha }}"

  deploy:
    needs: detect
    if: ${{ needs.detect.outputs.runs != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        run: ${{ fromJSON(needs.detect.outputs.runs) }}
    concurrency:
      group: deploy-vercel-${{ matrix.run }}
      cancel-in-progress: false
    env:
      RUN_NAME: ${{ matrix.run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run design gate
        run: |
          npx tsx src/validators/validate-design-gate.ts \
            --businesses "data/${RUN_NAME}-businesses.json" \
            --specs "data/site-specs/${RUN_NAME}-site-specs.json"

      - name: Generate sites
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          npx tsx src/generator/generate-sites.ts \
            "data/${RUN_NAME}-businesses.json" \
            --specs "data/site-specs/${RUN_NAME}-site-specs.json" \
            --require-real-images \
            --require-agent-frontends

      - name: Validate generated sites
        run: |
          EXPECTED_COUNT=$(node -e "process.stdout.write(String(require('./data/'+process.env.RUN_NAME+'-businesses.json').length))")
          npx tsx src/validators/validate-generated-sites.ts \
            --session "$RUN_NAME" \
            --require-agent-frontends \
            --expected-count "$EXPECTED_COUNT"

      - name: Validate client readiness
        run: |
          npx tsx src/validators/validate-client-readiness.ts \
            --session "$RUN_NAME" \
            --min-score 85

      - name: Deploy sites to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: ${{ github.event.inputs.vercel_scope || secrets.VERCEL_SCOPE }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: node scripts/deploy-generated.mjs --session "$RUN_NAME"
